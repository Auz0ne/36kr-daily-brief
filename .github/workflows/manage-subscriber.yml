name: Manage Subscriber

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - add
          - remove
          - list
      email:
        description: 'Email address (not needed for list)'
        required: false
        type: string

jobs:
  manage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ${{ inputs.action }} subscriber
        run: |
          if [ "${{ inputs.action }}" = "list" ]; then
            python manage_subscribers.py list
          else
            python manage_subscribers.py ${{ inputs.action }} "${{ inputs.email }}"
          fi

      - name: Commit and push
        if: inputs.action != 'list'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribers.json
          git commit -m "Subscriber: ${{ inputs.action }} ${{ inputs.email }}"
          git push
